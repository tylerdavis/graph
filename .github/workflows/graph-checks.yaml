# Dogfood: graph's own plans gate graph's PRs, one `graph plan run` per job.
# Jobs run inside the release container image (graph + git/jq/gh baked in),
# so there is no install step; all logic lives in the repo-carried plans
# (./.graph/) and the bundled github tool pack. GRAPH_EVENTS=github turns
# failing gates into run annotations. docs-drift fails the check (exit 4)
# on undocumented behavior changes; pr-review posts findings as a PR
# comment, edited in place on each push.
name: graph checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  packages: read                   # pull the (private) release image

concurrency:
  group: graph-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GRAPH_STORAGE: memory            # ephemeral: leave no state behind in CI
  GRAPH_EVENTS: github             # failing plans annotate the run
  GH_TOKEN: ${{ github.token }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  PR: ${{ github.event.pull_request.number }}
  BASE: ${{ github.event.pull_request.base.sha }}
  HEAD: ${{ github.event.pull_request.head.sha }}

jobs:
  docs-drift:
    # Drafts pay nothing; fork PRs have no ANTHROPIC_API_KEY (the ${VAR} in
    # .graph/config.toml hard-errors without it — that's the backstop).
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/tylerdavis/graph:v0.6.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # the plan diffs $BASE...$HEAD locally

      - name: Docs drift gate
        run: graph plan run docs_drift --input base="$BASE" --input head="$HEAD"

  pr-review:
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/tylerdavis/graph:v0.6.0
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review and comment
        run: graph plan run pr_review --input pr="$PR"
