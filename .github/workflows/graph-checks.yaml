# Dogfood: graph's own plans gate graph's PRs. Two independent jobs run in
# parallel — the docs-drift gate (merge check, exit code 4 = assertion fired)
# and the specialized reviewer (structured findings posted as a PR comment).
# Plans, tools, and config are repo-carried in ./.graph/.
name: graph checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: graph-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GRAPH_VERSION: v0.2.0            # exit gates shipped after v0.1.0 — needs ≥ v0.2.0
  GRAPH_STORAGE: memory            # ephemeral: no embedded DB, no lock
  GH_TOKEN: ${{ github.token }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  PR: ${{ github.event.pull_request.number }}
  BASE: ${{ github.event.pull_request.base.sha }}
  HEAD: ${{ github.event.pull_request.head.sha }}

jobs:
  docs-drift:
    # Drafts pay nothing; fork PRs have no ANTHROPIC_API_KEY (the ${VAR} in
    # .graph/config.toml hard-errors without it — that's the backstop).
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # git diff $BASE...$HEAD needs history

      - name: Install graph
        run: |
          asset="graph-$GRAPH_VERSION-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "$GRAPH_VERSION" --repo "$GITHUB_REPOSITORY" --pattern "$asset*"
          shasum -a 256 -c "$asset.sha256"
          tar xzf "$asset"
          sudo install -m 0755 graph /usr/local/bin/graph
          graph --version
        # Fallback until a ≥ v0.2.0 release exists (slow, ~10 min):
        #   - uses: jdx/mise-action@v2
        #   - run: sudo apt-get install -y libssl-dev pkg-config
        #   - run: cargo build --release -p graph-cli && sudo install target/release/graph /usr/local/bin/

      - name: Docs drift gate
        run: |
          set +e
          graph plan run docs_drift --input base="$BASE" --input head="$HEAD" > drift.json
          code=$?
          set -e
          cat drift.json
          if [ "$code" -eq 4 ]; then
            echo "::error::This PR changes crate behavior without touching docs/. CLAUDE.md requires the docs update in the same PR — the judge's reasoning is in the log above. If the verdict is wrong, add the docs note it's missing or push a docs edit."
            exit 1
          fi
          exit "$code"              # 0 = pass; 1/3 = the gate itself broke, fail loudly

  pr-review:
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install graph
        run: |
          asset="graph-$GRAPH_VERSION-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "$GRAPH_VERSION" --repo "$GITHUB_REPOSITORY" --pattern "$asset*"
          shasum -a 256 -c "$asset.sha256"
          tar xzf "$asset"
          sudo install -m 0755 graph /usr/local/bin/graph
          graph --version

      - name: Build review context
        run: |
          git diff "$BASE...$HEAD" -- crates/ docs/ | head -c 120000 > diff.patch
          gh pr view "$PR" --json title,body > pr.json
          jq -n --rawfile diff diff.patch --slurpfile pr pr.json \
            '{pr_number: (env.PR | tonumber),
              title: $pr[0].title,
              body: ($pr[0].body // ""),
              diff: $diff}' > review-input.json

      - name: Run specialized reviewer
        run: graph plan run pr_review @review-input.json > findings.json

      - name: Post review comment
        run: |
          jq -r '
            "### graph PR review\n\n" + .summary + "\n" +
            (if (.findings | length) == 0
             then "\n_No invariant findings._"
             else "\n| Severity | Invariant | File | Finding |\n|---|---|---|---|\n" +
               ([.findings[] |
                 "| \(.severity) | `\(.invariant)` | `\(.file)\(if .line then ":\(.line)" else "" end)` | \(.finding)\(if .suggestion then " — _\(.suggestion)_" else "" end) |"
               ] | join("\n"))
             end) +
            "\n\n<sub>Posted by the repo-carried pr_review plan (.graph/plans/pr_review.yaml).</sub>"' \
            findings.json > comment.md
          gh pr comment "$PR" --body-file comment.md --edit-last --create-if-none \
            || gh pr comment "$PR" --body-file comment.md
