name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**", "*.md"]
  pull_request:
    paths-ignore: ["docs/**", "*.md"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            # mise's [env] RUSTFLAGS uses the macOS linker spelling
          - os: ubuntu-24.04
            # GNU ld spelling for export-dynamic; openssl via apt
            rustflags_override: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL dev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Override RUSTFLAGS for GNU ld (Linux)
        if: matrix.rustflags_override
        run: |
          libdir=$(pkg-config --variable=libdir openssl)
          echo "RUSTFLAGS=-L$libdir -lssl -lcrypto -Clink-arg=-Wl,--export-dynamic" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2

      - name: Lint
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
