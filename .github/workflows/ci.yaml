name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["docs/**", "*.md"]
  pull_request:
    paths-ignore: ["docs/**", "*.md"]

env:
  CARGO_TERM_COLOR: always
  # sccache caches individual compiler invocations in the Actions cache, so
  # a Cargo.lock or toolchain rotation no longer recompiles every dependency
  # from scratch.
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache
  # sccache can't cache incremental artifacts (and CI can't reuse them).
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
          - os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL dev (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - uses: mozilla/sccache-action@v0.0.10

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - uses: Swatinem/rust-cache@v2

      - name: Lint
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
