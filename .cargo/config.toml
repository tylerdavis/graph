# lbug 0.18's prebuilt liblbug.a requires OpenSSL, but the published crate's
# build script emits no link directives for it (fixed upstream after 0.18.0,
# see LadybugDB/ladybug-rust build.rs on main). Until a release includes the
# fix, link Homebrew's openssl@3 explicitly. Drop this when lbug > 0.18.0.
# -export_dynamic (macOS spelling of -rdynamic) exports the statically linked
# lbug symbols so dlopen'd extensions (FTS, VECTOR) can bind against the host
# binary — also emitted by the fixed upstream build script.
[target.aarch64-apple-darwin]
rustflags = [
    "-L", "/opt/homebrew/opt/openssl@3/lib",
    "-lssl",
    "-lcrypto",
    "-C", "link-arg=-Wl,-export_dynamic",
]

[env]
PKG_CONFIG_PATH = "/opt/homebrew/opt/openssl@3/lib/pkgconfig"
