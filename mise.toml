# System dependencies and task runner for graph-cli.
# https://mise.jdx.dev
#
# openssl itself is not managed here — any source works (nix, homebrew, ...)
# as long as `pkg-config --variable=libdir openssl` resolves.

# pkg-config comes from the system (brew/apt/nix) — newer mise registries
# dropped it, and every target environment ships it anyway.
[tools]
rust = { version = "1.94", components = "rustfmt,clippy" }
"ubi:orhun/git-cliff" = "latest"

"node" = "lts"
"npm:mint" = "latest"

[tasks.build]
description = "Build the whole workspace"
run = "cargo build"

[tasks.test]
description = "Run all workspace tests"
run = "cargo test"

[tasks.lint]
description = "Check formatting and run clippy"
run = [
    "cargo fmt --all --check",
    "cargo clippy --workspace --all-targets -- -D warnings",
]

[tasks.fmt]
description = "Format the workspace"
run = "cargo fmt --all"

[tasks.run]
description = "Run the graph binary (pass args after --)"
run = "cargo run -p graph-cli --"

[tasks.release]
description = "Build the release binary"
run = "cargo build --release"

[tasks.install]
description = "Built and install a release binary on the system"
run = "cargo install --path crates/graph-cli"
depends = ["release"]

[tasks."release:patch"]
description = "Cut a patch release (bump, changelog, tag, push)"
run = "scripts/release.sh patch"

[tasks."release:minor"]
description = "Cut a minor release"
run = "scripts/release.sh minor"

[tasks."release:major"]
description = "Cut a major release"
run = "scripts/release.sh major"

[tasks.docs]
description = "Run docs preview"
run = "cd docs && mint dev"

[tasks.shots]
description = "Regenerate the workbench docs screenshots from docs/shots/ scenarios"
run = "cargo test -p graph-cli shots -- --nocapture"
