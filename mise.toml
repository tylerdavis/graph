# System dependencies and task runner for graph-cli.
# https://mise.jdx.dev
#
# openssl itself is not managed here — any source works (nix, homebrew, ...)
# as long as `pkg-config --variable=libdir openssl` resolves.

[tools]
rust = "1.94"
cmake = "4"
pkg-config = "latest"

[env]
# lbug 0.18's prebuilt liblbug.a needs OpenSSL but its build script emits no
# link directives (fixed upstream post-0.18.0), and its dlopen'd extensions
# (FTS, VECTOR) need host-exported symbols. Resolve the OpenSSL lib dir via
# pkg-config so the flags are independent of where openssl is installed.
# Drop this when lbug > 0.18.0 ships. Details: crates/graph-store/SPIKE.md.
RUSTFLAGS = "-L{{ exec(command='pkg-config --variable=libdir openssl') }} -lssl -lcrypto -Clink-arg=-Wl,-export_dynamic"

[tasks.build]
description = "Build the whole workspace"
run = "cargo build"

[tasks.test]
description = "Run all workspace tests"
run = "cargo test"

[tasks."test:spike"]
description = "Run the LadybugDB spike tests"
run = "cargo test -p graph-store --test ladybug_spike"

[tasks.lint]
description = "Check formatting and run clippy"
run = [
    "cargo fmt --all --check",
    "cargo clippy --workspace --all-targets -- -D warnings",
]

[tasks.fmt]
description = "Format the workspace"
run = "cargo fmt --all"

[tasks.run]
description = "Run the graph binary (pass args after --)"
run = "cargo run -p graph-cli --"

[tasks.release]
description = "Build the release binary"
run = "cargo build --release"

[tasks.install]
description = "Built and install a release binary on the system"
run = "cargo install --path crates/graph-cli"
depends = ["release"]

[tasks.explorer]
description = "Ladybug DB Explorer"
run = "podman run -p 8888:8000 -v ~/.local/share/graph:/database -e LBUG_FILE=db --rm ghcr.io/ladybugdb/explorer:latest"
