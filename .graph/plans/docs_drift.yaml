# Docs-drift gate: fails (exit-gate error → process exit 4) when a PR changes
# crate behavior without touching docs/ — the CLAUDE.md rule, enforced.
# Short-circuits with zero LLM calls when no crate code changed (E1) or docs
# were updated alongside (E2); only then does the judge see the diff (E4).
# Every exit path emits the same {docs_required, reason} shape.
identifier: docs_drift
name: Docs drift gate
description: >
  Checks whether a PR changes crate behavior without a docs/ update. Exits
  successfully (zero LLM calls) when no crate code changed or docs were
  touched; otherwise an inferred exit gate judges the crate diff and asserts
  an error when documentation is required. Process exit code 4 on assertion.
input_schema:
  type: object
  required: [base, head]
  properties:
    base: { type: string, description: Base ref or sha of the PR }
    head: { type: string, description: Head ref or sha of the PR }
steps:
  - id: E0
    tool_name: user__pr_changed_files
    input: { base: "{{input.base}}", head: "{{input.head}}" }
    reasoning: Bucket the changed files into crate source vs docs.
  - id: E1
    tool_name: exit
    input:
      when: { value: "{{E0.crates}}", op: empty }
      status: success
      message: no crate code changed — docs gate not applicable
      output: { docs_required: false, reason: no_crate_changes }
    reasoning: Docs-only or CI-only PRs pass immediately, no LLM.
  - id: E2
    tool_name: exit
    input:
      when: { value: "{{E0.docs}}", op: not_empty }
      status: success
      message: docs updated alongside crate changes
      output: { docs_required: false, reason: docs_touched }
    reasoning: The rule is satisfied by construction, no LLM.
  - id: E3
    tool_name: user__pr_crate_diff
    input: { base: "{{input.base}}", head: "{{input.head}}" }
    reasoning: Fetch the crate diff for the judge, truncated to budget.
  - id: E4
    tool_name: exit
    input:
      infer: |
        Does this diff change user-visible behavior of the graph CLI — CLI
        surface, plan or tool file formats, template semantics, error
        handling, exit codes, prompts the planner sees, or configuration —
        such that the documentation under docs/ would need an update? Pure
        refactors, comment-only changes, test-only changes, and internal
        renames do not count. Answer yes only if the behavior a user or plan
        author observes would change.

        {{E3.text}}
      status: error
      message: >-
        behavioral change without a docs/ update — CLAUDE.md requires docs
        land in the same PR as the behavior change
    reasoning: One judge call decides; error exit fails the CI check.
output:
  docs_required: false
  reason: "{{E4.reason}}"
