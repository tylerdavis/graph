# Specialized PR reviewer, self-contained: fetches its own context via the
# bundled github tool pack, reviews the full diff (minus generated files)
# against the repo rubric, anchors line-resolvable findings as inline diff
# comments, and posts/updates the summary comment — each finding's File
# cell links to its inline comment. Silent finish — the comments are the
# deliverable. The CI step is one line:
#   graph plan run pr_review --input pr=$PR
identifier: pr_review
name: Specialized PR review
description: >
  Reviews a pull request against graph-cli's invariants, anchors findings
  as inline diff comments, and posts a summary comment linking to them
  (all refreshed in place on repeated runs). Needs gh auth and a checkout
  with history.
input_schema:
  type: object
  required: [pr]
  properties:
    pr: { type: integer, description: Pull request number }
steps:
  - id: E0
    tool_name: builtin__gh_pr_meta
    input: { pr: "{{input.pr}}" }
    reasoning: Title, body, and the base/head shas to diff.
  - id: E1
    tool_name: builtin__git_diff
    input:
      base: "{{E0.base_sha}}"
      head: "{{E0.head_sha}}"
      paths: "."
      exclude: "Cargo.lock CHANGELOG.md"
      max_bytes: 120000
    reasoning: The full change, minus generated files, within token budget.
  - id: E2
    tool_name: exit
    input:
      when: { value: "{{E1.text}}", op: empty }
      status: success
      message: empty diff — nothing to review
    reasoning: Nothing to review means a clean, zero-LLM exit, no comment.
  - id: E3
    tool_name: user__review_graph_pr
    input:
      title: "{{E0.title}}"
      body: "{{E0.body}}"
      diff: "{{E1.text}}"
    reasoning: One rubric'd review call with enforced structured output.
  - id: E4
    tool_name: user__findings_to_review_comments
    input: { findings: "{{E3.findings}}" }
    reasoning: Deterministic findings → comment entries; fields pass through.
  - id: E5
    tool_name: builtin__gh_pr_inline_comments
    input:
      pr: "{{input.pr}}"
      head_sha: "{{E0.head_sha}}"
      marker: "graph:pr_review"
      comments: "{{E4.comments}}"
    reasoning: >
      Anchor line-resolvable findings on the diff; earlier runs' comments
      are cleared first, and each posted entry comes back with its url.
  - id: E6
    tool_name: builtin__gh_pr_comment
    input:
      pr: "{{input.pr}}"
      body: |
        ### graph PR review

        {{E3.summary}}
        {{^E5.comments}}
        _No invariant findings._
        {{/E5.comments}}
        {{#E5.comments}}{{#@first}}
        | Severity | Invariant | File | Finding | Fix |
        |---|---|---|---|---|
        {{/@first}}| {{severity}} | `{{invariant}}` | {{#url}}[`{{file}}`]({{url}}){{/url}}{{^url}}`{{file}}`{{/url}} | {{finding}} | {{suggestion}} |
        {{/E5.comments}}

        <sub>Posted by the repo-carried pr_review plan (.graph/plans/pr_review.yaml).</sub>
    reasoning: >
      Summary table over the url-enriched entries — File cells link to the
      inline comments; repeated runs edit the same comment.
