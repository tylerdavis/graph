# exec tool: unified diff of crates/ between two refs, truncated to a
# judge-sized budget (~60KB ≈ 15K tokens). No pipefail: head truncating the
# stream mid-diff is intentional, and refs are validated upstream by
# pr_changed_files in the docs_drift plan.
name: pr_crate_diff
description: >
  Unified diff of crates/ between two git refs (merge-base diff), truncated
  to roughly 60KB for LLM consumption.
kind: exec
command: bash
args:
  - "-ceu"
  - 'git diff "$1...$2" -- crates/ | head -c 60000'
  - pr_crate_diff
  - "{{input.base}}"
  - "{{input.head}}"
output: text
timeout_secs: 30
read_only: true
input_schema:
  type: object
  required: [base, head]
  properties:
    base: { type: string, description: Base ref or commit sha }
    head: { type: string, description: Head ref or commit sha }
