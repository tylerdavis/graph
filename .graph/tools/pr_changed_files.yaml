# exec tool: changed files between two refs, bucketed for the docs-drift gate.
# pipefail matters: without it a bad ref would yield empty buckets and the
# gate would silently pass instead of failing the plan.
name: pr_changed_files
description: >
  Files changed between two git refs (merge-base diff), bucketed for the
  docs-drift gate: all files, crate source, and docs.
kind: exec
command: bash
args:
  - "-ceuo"
  - "pipefail"
  - |
    git diff --name-only "$1...$2" | jq -R -s '
      (split("\n") | map(select(length > 0))) as $all
      | { all:    $all,
          crates: ($all | map(select(startswith("crates/")))),
          docs:   ($all | map(select(startswith("docs/")))) }'
  - pr_changed_files
  - "{{input.base}}"
  - "{{input.head}}"
output: json
timeout_secs: 30
read_only: true
input_schema:
  type: object
  required: [base, head]
  properties:
    base: { type: string, description: Base ref or commit sha }
    head: { type: string, description: Head ref or commit sha }
output_schema:
  type: object
  properties:
    all:    { type: array, items: { type: string } }
    crates: { type: array, items: { type: string } }
    docs:   { type: array, items: { type: string } }
