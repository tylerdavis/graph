# llm pack: generic inference — the prompt-tool machinery exposed as one
# callable tool. Plain text out by default; validated structured JSON when
# the call supplies an output_schema.
name: infer
description: >
  Run an LLM inference over an instruction. Returns {text: ...} by default;
  pass output_schema (a JSON Schema object) to instead get structured JSON
  validated against it — every declared field is guaranteed present, so
  downstream template references like {{Ex.score}} are safe. The
  instruction must be self-contained: interpolate the data to analyze
  directly into it with templates. To analyze each element of a list, call
  this inside a `map` body interpolating {{item}} per call — small, focused
  contexts are cheaper and more accurate than one instruction carrying the
  whole list. Interpolate a whole list only when the question is genuinely
  cross-item (ranking, deduplication, aggregation).
kind: prompt
prompt: "{{input.instruction}}"
caller_output_schema: true
# The call's `model` input picks the model; the catalog advertises the
# configured [models.named] entries on this tool's schema when any exist.
caller_model: true
input_schema:
  type: object
  required: [instruction]
  properties:
    instruction:
      type: string
      description: >
        Complete, self-contained instruction, including the data to analyze
        (reference earlier step results with {{Ex...}} templates, or the
        current element with {{item}} inside a map body).
    output_schema:
      type: object
      description: >
        Optional JSON Schema for the result. When present, the output is
        structured JSON matching this schema instead of {text: ...}.
