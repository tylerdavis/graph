# github pack: unified diff between two refs, scoped and truncated.
# `paths` and `exclude` are space-separated lists; pass "." and "" when
# unscoped. The diff lands in a temp file first, so truncation is detected
# and marked in the output — and an unresolvable ref fails the step loudly
# instead of yielding an empty diff that downstream gates would misread as
# "nothing changed".
name: git_diff
description: >
  Unified diff between two git refs (merge-base three-dot diff), optionally
  scoped to paths, with excludes, truncated to a byte budget for LLM
  consumption. A truncated diff ends with a "[diff truncated: showing X of
  Y bytes]" marker line; its absence means the diff is complete.
kind: exec
command: bash
args:
  - "-ceu"
  - |
    base=$1 head=$2 paths=$3 exclude=$4 max=$5
    spec=()
    for p in $paths; do spec+=("$p"); done
    for e in $exclude; do spec+=(":(exclude)$e"); done
    tmp=$(mktemp)
    trap 'rm -f "$tmp"' EXIT
    git diff "$base...$head" -- "${spec[@]}" > "$tmp"
    total=$(wc -c < "$tmp" | tr -d ' ')
    head -c "$max" "$tmp"
    if [ "$total" -gt "$max" ]; then
      printf '\n\n[diff truncated: showing %s of %s bytes]\n' "$max" "$total"
    fi
  - git_diff
  - "{{input.base}}"
  - "{{input.head}}"
  - "{{input.paths}}"
  - "{{input.exclude}}"
  - "{{input.max_bytes}}"
output: text
timeout_secs: 30
read_only: true
input_schema:
  type: object
  required: [base, head, paths, exclude, max_bytes]
  properties:
    base:      { type: string, description: Base ref or commit sha }
    head:      { type: string, description: Head ref or commit sha }
    paths:     { type: string, description: Space-separated pathspecs; "." for everything }
    exclude:   { type: string, description: Space-separated paths to exclude; "" for none }
    max_bytes: { type: integer, description: Truncate the diff to this many bytes (a marker line flags truncation) }
